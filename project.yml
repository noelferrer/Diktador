name: Diktador
options:
  bundleIdPrefix: com.noelferrer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
packages:
  DiktadorHotkey:
    path: modules/diktador-hotkey
  DiktadorRecorder:
    path: modules/diktador-recorder
  DiktadorTranscriber:
    path: modules/diktador-transcriber
targets:
  Diktador:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Diktador
    dependencies:
      - package: DiktadorHotkey
        product: DiktadorHotkey
      - package: DiktadorRecorder
        product: DiktadorRecorder
      - package: DiktadorTranscriber
        product: DiktadorTranscriber
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noelferrer.Diktador
        CODE_SIGN_ENTITLEMENTS: Diktador/Diktador.entitlements
        PRODUCT_NAME: Diktador
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Diktador uses your microphone to transcribe speech."
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: Diktador
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
